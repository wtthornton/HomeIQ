# HomeIQ PostgreSQL 17 Configuration
# Tuned for development / small production (1GB container memory limit)
# Mounted at: /etc/postgresql/postgresql.conf
# Applied via: postgres -c config_file=/etc/postgresql/postgresql.conf

# =============================================================================
# Performance Monitoring
# =============================================================================

# pg_stat_statements — query-level performance tracking
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# =============================================================================
# Logging — slow queries and schema changes
# =============================================================================

log_min_duration_statement = 500      # Log queries taking >500ms
log_statement = 'ddl'                 # Log CREATE/ALTER/DROP statements
log_connections = on
log_disconnections = on
log_line_prefix = '%t [%p] %u@%d '   # Timestamp, PID, user@database
log_lock_waits = on                   # Log lock waits longer than deadlock_timeout
log_temp_files = 0                    # Log all temp file usage

# =============================================================================
# Connection Tuning
# =============================================================================

max_connections = 200
listen_addresses = '*'

# =============================================================================
# Memory
# =============================================================================

# shared_buffers: ~25% of 1GB container limit
shared_buffers = 256MB

# effective_cache_size: estimate of OS + PG cache available (~50-75% of RAM)
effective_cache_size = 512MB

# work_mem: per-sort/hash operation; conservative to avoid OOM with many connections
work_mem = 4MB

# maintenance_work_mem: VACUUM, CREATE INDEX, ALTER TABLE ADD FOREIGN KEY
maintenance_work_mem = 64MB

# =============================================================================
# WAL (Write-Ahead Log)
# =============================================================================

wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

# =============================================================================
# Query Planner
# =============================================================================

# Encourage index scans over sequential scans when beneficial
random_page_cost = 1.1                # SSD-optimized (default 4.0 for HDD)
effective_io_concurrency = 200        # SSD-optimized (default 1)

# =============================================================================
# Autovacuum
# =============================================================================

autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 60               # Check for work every 60s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
