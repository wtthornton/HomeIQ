# Prometheus alert rules for HomeIQ
# Monitors service health, error rates, latency, resource usage, and infrastructure.

groups:
  # --- Service Health ---
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }}/{{ $labels.instance }} is down"
          description: "{{ $labels.service }} in {{ $labels.group }} has been unreachable for more than 2 minutes."

      - alert: ServiceHighRestartRate
        expr: changes(process_start_time_seconds[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.service }} is restarting frequently"
          description: "{{ $labels.service }} has restarted more than 3 times in the last hour."

  # --- HTTP Error Rates ---
  - name: http_errors
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum by (service, group) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            sum by (service, group) (rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} in {{ $labels.group }} has a 5xx error rate above 5% for the last 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: ElevatedClientErrors
        expr: |
          (
            sum by (service, group) (rate(http_requests_total{status=~"4.."}[5m]))
            /
            sum by (service, group) (rate(http_requests_total[5m]))
          ) > 0.20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 4xx error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has a 4xx error rate above 20% for the last 10 minutes (current: {{ $value | humanizePercentage }})."

  # --- Latency ---
  - name: latency
    rules:
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum by (service, group, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "{{ $labels.service }} p95 response time is above 2 seconds for the last 5 minutes (current: {{ $value | humanizeDuration }})."

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum by (service, group, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.service }}"
          description: "{{ $labels.service }} p99 response time is above 5 seconds for the last 5 minutes (current: {{ $value | humanizeDuration }})."

  # --- PostgreSQL ---
  - name: postgresql
    rules:
      - alert: PostgresConnectionPoolExhaustion
        expr: |
          (
            pg_stat_activity_count{datname="homeiq"}
            /
            pg_settings_max_connections
          ) > 0.80
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL connection pool near exhaustion"
          description: "PostgreSQL connection usage is above 80% ({{ $value | humanizePercentage }}). Consider increasing max_connections or optimizing connection pooling."

      - alert: PostgresTooManyDeadTuples
        expr: pg_stat_user_tables_n_dead_tup > 100000
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL table {{ $labels.relname }} has too many dead tuples"
          description: "Table {{ $labels.relname }} in schema {{ $labels.schemaname }} has {{ $value }} dead tuples. Consider running VACUUM."

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance at {{ $labels.instance }} is unreachable."

      - alert: PostgresSlowQueries
        expr: pg_stat_activity_max_tx_duration{datname="homeiq"} > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL has long-running queries"
          description: "Longest transaction on homeiq database has been running for {{ $value | humanizeDuration }}."

      - alert: PostgresLowCacheHitRatio
        expr: |
          (
            pg_stat_database_blks_hit{datname="homeiq"}
            /
            (pg_stat_database_blks_hit{datname="homeiq"} + pg_stat_database_blks_read{datname="homeiq"})
          ) < 0.95
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL cache hit ratio is low"
          description: "Cache hit ratio for homeiq database is {{ $value | humanizePercentage }}. Expected above 95%."

  # --- Resource Usage ---
  - name: resource_usage
    rules:
      - alert: HighMemoryUsage
        expr: |
          (
            process_resident_memory_bytes
            /
            (container_memory_limit_bytes > 0 or process_resident_memory_bytes * 2)
          ) > 0.80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.service }}"
          description: "{{ $labels.service }} is using more than 80% of its memory limit for the last 10 minutes."

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.service }}"
          description: "{{ $labels.service }} CPU usage is above 90% for the last 10 minutes."

  # --- InfluxDB ---
  - name: influxdb
    rules:
      - alert: InfluxDBDown
        expr: up{job="core-platform", service="influxdb"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "InfluxDB is down"
          description: "InfluxDB has been unreachable for more than 1 minute. All time-series data ingestion is stopped."

      - alert: InfluxDBWriteFailures
        expr: rate(http_requests_total{job="core-platform", service="data-api", handler="/api/v1/events", status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "InfluxDB write failures detected"
          description: "Data API is experiencing elevated 5xx errors on the events endpoint, indicating potential InfluxDB write failures."

  # --- Disk Space ---
  - name: disk_space
    rules:
      - alert: DiskSpaceWarning
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint="/"}
            /
            node_filesystem_size_bytes{mountpoint="/"}
          ) < 0.20
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running low"
          description: "Less than 20% disk space remaining on {{ $labels.instance }} ({{ $value | humanizePercentage }} available)."

      - alert: DiskSpaceCritical
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint="/"}
            /
            node_filesystem_size_bytes{mountpoint="/"}
          ) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critically low"
          description: "Less than 10% disk space remaining on {{ $labels.instance }} ({{ $value | humanizePercentage }} available). Immediate action required."

  # --- Tier 1 Critical Services ---
  - name: tier1_critical
    rules:
      - alert: Tier1ServiceDegraded
        expr: up{tier="1"} == 0
        for: 1m
        labels:
          severity: critical
          page: "true"
        annotations:
          summary: "CRITICAL: Tier 1 service {{ $labels.service }} is down"
          description: "{{ $labels.service }} is a Tier 1 critical service. All downstream services depend on it. Immediate investigation required."

      - alert: WebsocketIngestionBackpressure
        expr: rate(http_requests_total{service="websocket-ingestion", status=~"429|503"}[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Websocket ingestion experiencing backpressure"
          description: "The websocket-ingestion service is returning 429/503 responses, indicating it cannot keep up with incoming events."

  # --- Application Pool Metrics (Story 56.4) ---
  - name: app_pool_metrics
    rules:
      - alert: AppPoolExhaustion
        expr: db_pool_utilization_percent > 80
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Application DB pool near exhaustion on {{ $labels.job }}"
          description: "Application-level database pool utilization is {{ $value }}% on {{ $labels.instance }}. Connections may start queuing."

      - alert: AppPoolCheckedOutHigh
        expr: db_pool_checked_out > 15
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High checked-out DB connections on {{ $labels.job }}"
          description: "{{ $labels.instance }} has {{ $value }} checked-out DB connections."

  # --- Tier-Specific Latency (Story 56.4) ---
  - name: tier_latency
    rules:
      - alert: Tier1HighLatency
        expr: |
          histogram_quantile(0.95,
            sum by (service, le) (rate(http_request_duration_seconds_bucket{tier="1"}[5m]))
          ) > 2
        for: 3m
        labels:
          severity: critical
          page: "true"
        annotations:
          summary: "Tier 1 service {{ $labels.service }} p95 latency > 2s"
          description: "Critical path service {{ $labels.service }} p95 latency is {{ $value | humanizeDuration }}. SLA breach risk."

      - alert: Tier2PlusHighLatency
        expr: |
          histogram_quantile(0.95,
            sum by (service, le) (rate(http_request_duration_seconds_bucket{tier=~"[2-7]"}[5m]))
          ) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.service }} p95 latency > 5s"
          description: "{{ $labels.service }} p95 latency is {{ $value | humanizeDuration }}."

  # --- Enhanced Resource Limits (Story 56.4) ---
  - name: resource_limits
    rules:
      - alert: MemoryNearLimit
        expr: |
          (
            process_resident_memory_bytes
            /
            on(instance) group_left container_memory_limit_bytes
          ) > 0.90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} memory at 90% of limit"
          description: "{{ $labels.service }} is using over 90% of its container memory limit. OOM kill imminent."

      - alert: DiskUsageHigh
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint="/"}
            /
            node_filesystem_size_bytes{mountpoint="/"}
          ) < 0.15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 85%"
          description: "Less than 15% disk space remaining on {{ $labels.instance }}."

  # --- SLA Alerts (Epic 79, Story 79.2) ---
  - name: sla_alerts
    rules:
      # Tier 1: 99.9% availability SLA
      - alert: Tier1SLABreach
        expr: service:availability:ratio_1h{tier="1"} < 0.999
        for: 5m
        labels:
          severity: critical
          page: "true"
        annotations:
          summary: "Tier 1 SLA breach: {{ $labels.service }} availability {{ $value | humanizePercentage }}"
          description: "Critical service {{ $labels.service }} has dropped below 99.9% availability SLA target. Current: {{ $value | humanizePercentage }}."

      - alert: Tier1LatencySLABreach
        expr: service:latency:p95_5m{tier="1"} > 0.5
        for: 5m
        labels:
          severity: warning
          page: "true"
        annotations:
          summary: "Tier 1 latency SLA breach: {{ $labels.service }} p95 {{ $value | humanizeDuration }}"
          description: "Critical service {{ $labels.service }} p95 latency exceeds 500ms SLA target. Current: {{ $value | humanizeDuration }}."

      - alert: Tier1ErrorRateSLABreach
        expr: service:error_rate:ratio_5m{tier="1"} > 0.001
        for: 5m
        labels:
          severity: critical
          page: "true"
        annotations:
          summary: "Tier 1 error rate SLA breach: {{ $labels.service }} at {{ $value | humanizePercentage }}"
          description: "Critical service {{ $labels.service }} error rate exceeds 0.1% SLA target. Current: {{ $value | humanizePercentage }}."

      # Tier 2: 99.5% availability SLA
      - alert: Tier2SLABreach
        expr: service:availability:ratio_1h{tier="2"} < 0.995
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Tier 2 SLA breach: {{ $labels.service }} availability {{ $value | humanizePercentage }}"
          description: "Essential service {{ $labels.service }} has dropped below 99.5% availability SLA target. Current: {{ $value | humanizePercentage }}."

      - alert: Tier2LatencySLABreach
        expr: service:latency:p95_5m{tier="2"} > 1.0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Tier 2 latency SLA breach: {{ $labels.service }} p95 {{ $value | humanizeDuration }}"
          description: "Essential service {{ $labels.service }} p95 latency exceeds 1s SLA target. Current: {{ $value | humanizeDuration }}."

      # Tier 3+: 99.0% availability SLA
      - alert: Tier3SLABreach
        expr: service:availability:ratio_1h{tier=~"[3-9]"} < 0.99
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Tier 3+ SLA breach: {{ $labels.service }} availability {{ $value | humanizePercentage }}"
          description: "Service {{ $labels.service }} has dropped below 99.0% availability SLA target. Current: {{ $value | humanizePercentage }}."

      # Error Budget Burn Rate
      - alert: ErrorBudgetBurnRateCritical
        expr: service:error_budget:remaining_30d < 0.10
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Error budget < 10% for {{ $labels.service }}"
          description: "Service {{ $labels.service }} has consumed over 90% of its 30-day error budget. Remaining: {{ $value | humanizePercentage }}."

      - alert: ErrorBudgetBurnRateWarning
        expr: service:error_budget:remaining_30d < 0.25
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Error budget < 25% for {{ $labels.service }}"
          description: "Service {{ $labels.service }} has consumed over 75% of its 30-day error budget. Remaining: {{ $value | humanizePercentage }}."

  # --- Cross-Cutting Alerts (Epic 79, Story 79.2) ---
  - name: cross_cutting_alerts
    rules:
      # Zeek security alert escalation
      - alert: ZeekAlertEscalation
        expr: count(ALERTS{alertname=~"Zeek.*", alertstate="firing"}) > 5
        for: 5m
        labels:
          severity: critical
          domain: security
        annotations:
          summary: "Multiple Zeek security alerts firing ({{ $value }} active)"
          description: "More than 5 Zeek security alerts are active simultaneously. This may indicate a coordinated attack or widespread network issue."

      # Memory Brain health — embedding service down
      - alert: MemoryBrainEmbeddingDown
        expr: up{service="rag-service"} == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Memory Brain embedding service (rag-service) is down"
          description: "The RAG service used for Memory Brain embeddings has been unreachable for over 3 minutes. Memory search and consolidation are impaired."

      # Cross-group circuit breaker open
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state{state="open"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker open: {{ $labels.service }} -> {{ $labels.target }}"
          description: "A cross-group circuit breaker has been open for over 5 minutes between {{ $labels.service }} and {{ $labels.target }}. Inter-service communication is degraded."
