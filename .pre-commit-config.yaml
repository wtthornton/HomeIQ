# Pre-commit hooks for HomeIQ
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.ps1$'

  - repo: local
    hooks:
      - id: dockerfile-shared-libs
        name: Validate Dockerfile shared lib installs
        entry: python scripts/validate-dockerfile-libs.py --strict
        language: python
        files: (Dockerfile|requirements.*\.txt)$
        pass_filenames: false

      - id: no-secrets
        name: Check for hardcoded secrets
        entry: python scripts/check-secrets.py
        language: python
        types_or: [ts, tsx, javascript, jsx, python, json, yaml, text]
        exclude: '(\.example$|\.template$|test-data\.ts$|api-mocks\.ts$|auth-helpers\.ts$|\.test\.|\.spec\.|__tests__)'
