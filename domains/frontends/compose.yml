name: homeiq-frontends
# domains/frontends/compose.yml — User-facing UIs and observability tooling

services:
  jaeger:
    image: jaegertracing/jaeger:2.15.0
    container_name: homeiq-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - homeiq-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=jaeger,group=frontends,environment=production"
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '1.0'
        reservations:
          memory: 192M
          cpus: '0.5'

  observability-dashboard:
    build:
      context: ../..
      dockerfile: domains/frontends/observability-dashboard/Dockerfile
    container_name: homeiq-observability-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - ../../.env
    environment:
      - JAEGER_URL=http://jaeger:16686
      - JAEGER_API_URL=http://jaeger:16686/api
      - DATA_API_URL=http://data-api:8006
      - ADMIN_API_URL=http://admin-api:8004
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      jaeger:
        condition: service_started
      # Cross-domain: depends on core-platform/influxdb, core-platform/data-api, core-platform/admin-api
    networks:
      - homeiq-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '1.0'
        reservations:
          memory: 192M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=observability-dashboard,group=frontends,environment=production"

  ai-automation-ui:
    build:
      context: ../..
      dockerfile: domains/frontends/ai-automation-ui/Dockerfile
      args:
        - VITE_API_URL=
        # SECURITY: API key must be provided via environment, not hardcoded
        # Set API_KEY in .env or pass at runtime: API_KEY=your_key docker compose up
        - VITE_API_KEY=${API_KEY:-}
    container_name: homeiq-ai-automation-ui
    restart: unless-stopped
    ports:
      - "3001:8080"
    environment:
      - VITE_API_URL=
      # SECURITY: API key injected at runtime via nginx proxy, not baked into client
      - VITE_API_KEY=${API_KEY:-}
    # Cross-domain: depends on ml-engine/ai-core-service, automation-core/ai-automation-service-new
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: '1.0'
        reservations:
          memory: 48M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ai-ui,group=frontends,environment=production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  voice-gateway:
    build:
      context: ../..
      dockerfile: domains/frontends/voice-gateway/Dockerfile
    container_name: homeiq-voice-gateway
    restart: unless-stopped
    ports:
      - "8047:8047"
    env_file:
      - ../../.env
    environment:
      - SERVICE_PORT=8047
      - SERVICE_NAME=voice-gateway
      - AGENT_SERVICE_URL=http://ha-ai-agent-service:8030
      - STT_ENABLED=${VOICE_STT_ENABLED:-true}
      - STT_MODEL_SIZE=${VOICE_STT_MODEL:-base}
      - TTS_ENABLED=${VOICE_TTS_ENABLED:-true}
      - TTS_VOICE=${VOICE_TTS_VOICE:-af_heart}
      - WAKE_WORD_ENABLED=${VOICE_WAKE_WORD_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # Cross-domain: depends on automation-core/ha-ai-agent-service
    networks:
      - homeiq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8047/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=voice-gateway,group=frontends,environment=production"

networks:
  homeiq-network:
    external: true
