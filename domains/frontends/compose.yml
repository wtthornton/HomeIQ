# domains/frontends/compose.yml — User-facing UIs and observability tooling

services:
  jaeger:
    image: jaegertracing/jaeger:2.15.0
    container_name: homeiq-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - homeiq-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=jaeger,group=frontends,environment=production"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  observability-dashboard:
    build:
      context: ../..
      dockerfile: domains/frontends/observability-dashboard/Dockerfile
    container_name: homeiq-observability-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - ../../.env
    environment:
      - JAEGER_URL=http://jaeger:16686
      - JAEGER_API_URL=http://jaeger:16686/api
      - OTLP_ENDPOINT=http://jaeger:4317
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-homeiq-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-homeiq}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-home_assistant_events}
      - DATA_API_URL=http://data-api:8006
      - ADMIN_API_URL=http://admin-api:8004
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      jaeger:
        condition: service_started
      # Cross-domain: depends on core-platform/influxdb, core-platform/data-api, core-platform/admin-api
    networks:
      - homeiq-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=observability-dashboard,group=frontends,environment=production"

  ai-automation-ui:
    build:
      context: ai-automation-ui
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
        - VITE_API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
    container_name: ai-automation-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=
      - VITE_API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
    # Cross-domain: depends on ml-engine/ai-core-service, automation-core/ai-automation-service-new
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        labels: "service=ai-ui,group=frontends,environment=production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  homeiq-network:
    external: true
