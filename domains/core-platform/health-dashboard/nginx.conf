# Use upstream block for proper DNS resolution with Docker's internal DNS
# This ensures nginx uses the resolver for dynamic hostname resolution
# NOTE: upstream must be defined at the http level, not inside server block
# 2025 Best Practice: Use resolver for dynamic DNS resolution to handle container restarts
upstream data_api {
    server data-api:8006;
    keepalive 32;
}

# Note: ha-setup-service upstream removed - using variable-based proxy_pass instead
# This allows nginx to start even if ha-setup-service is not running

# CSRF protection helpers
map $request_method $csrf_required {
    default 0;
    POST 1;
    PUT 1;
    PATCH 1;
    DELETE 1;
}

map "$csrf_required:$http_x_csrf_token:$cookie_homeiq_csrf" $csrf_block {
    "~^0:" 0;
    "~^1:([A-Za-z0-9_-]+):\1$" 0;
    "~^1::" 1;
    "~^1:.*$" 1;
    default 0;
}

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS for dynamic hostname resolution
    # This prevents nginx from caching IPs when containers restart
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 3s;

    # Block state-changing requests without CSRF token + cookie
    if ($csrf_block = 1) {
        return 403;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # === DATA API ROUTES (Feature Data Hub - Port 8006) ===
    # Story 13.2: Events and Devices endpoints migrated to data-api
    
    # Events endpoints → data-api
    location /api/v1/events {
        proxy_pass http://data_api/api/v1/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    # Devices & Entities endpoints → Data API (Story 13.2)
    # Use upstream block for consistent DNS resolution and better performance
    location /api/devices {
        # Use $request_uri to preserve full URI including query string
        proxy_pass http://data_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    location /api/entities {
        # Use $request_uri to preserve full URI including query string
        proxy_pass http://data_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    location /api/integrations {
        # Proxy to data-api - use upstream block for connection pooling and reliability
        proxy_pass http://data_api/api/integrations;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    # Story 13.3: Alerts, Metrics, WebSocket endpoints → data-api
    location /api/v1/alerts {
        proxy_pass http://data_api/api/v1/alerts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    location /api/v1/analytics {
        proxy_pass http://data_api/api/v1/analytics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    # Story 2.3: Activity Recognition endpoints → data-api
    location /api/v1/activity {
        proxy_pass http://data_api/api/v1/activity;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    # Phase 4: Energy Correlation Endpoints
    location /api/v1/energy {
        proxy_pass http://data_api/api/v1/energy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    location /api/v1/metrics {
        proxy_pass http://data_api/api/v1/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    # WebSocket → data-api (Story 13.3)
    location /api/v1/ws {
        proxy_pass http://data_api/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
    
    # Story 13.4: Sports Data & HA Automation → data-api (Epic 12 + 13)
    # Route /api/sports/* to data-api /api/v1/sports/* (for frontend compatibility)
    location /api/sports {
        proxy_pass http://data_api/api/v1/sports;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    # Also support /api/v1/sports for consistency
    location /api/v1/sports {
        proxy_pass http://data_api/api/v1/sports;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
    
    location /api/v1/ha {
        proxy_pass http://data_api/api/v1/ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 10s;
    }
    
    # === ADMIN API ROUTES (System Monitoring - Port 8004/8003) ===
    # System health, Docker, config, system stats endpoints
    # NOTE: Use variable-based proxy_pass so nginx re-resolves DNS via the
    # resolver directive on every request. Static hostnames are resolved once
    # at config load and cached forever, causing 502s when containers restart.

    # Proxy API calls to admin API - system monitoring endpoints
    # Variable-based proxy_pass forces DNS re-resolution via resolver directive.
    # With variables, nginx does NOT strip the location prefix, so we use
    # $request_uri (same path on both sides) or rewrite (for path remapping).
    location /api/v1/ {
        set $admin_api "http://admin-api:8004";
        proxy_pass $admin_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward Authorization header for API authentication
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # WebSocket proxy for real-time dashboard updates
    location /ws {
        set $admin_api_ws "http://admin-api:8004";
        proxy_pass $admin_api_ws$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Proxy metrics API calls directly to admin API
    location /api/metrics/realtime {
        set $admin_api_metrics "http://admin-api:8004";
        proxy_pass $admin_api_metrics$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # IMPORTANT: Specific /api/* routes MUST come before catch-all /api/ to avoid matching conflicts
    # Proxy API calls to admin API - legacy /api/ paths (catch-all - MUST BE LAST)
    # Rewrites /api/* to /api/v1/* before proxying
    location /api/ {
        set $admin_api_legacy "http://admin-api:8004";
        rewrite ^/api/(.*) /api/v1/$1 break;
        proxy_pass $admin_api_legacy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward Authorization header for API authentication
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

      # === EXTERNAL SERVICE PROXIES (Log Aggregator, AI Automation, Weather, Setup) ===
      location /log-aggregator/ {
          # Proxy to log-aggregator - use direct proxy_pass without variables for reliability
          proxy_pass http://log-aggregator:8015/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /ai-automation/ {
          # Proxy to ai-automation-service-new - use direct proxy_pass without variables for reliability
          # Service runs on port 8025 internally (external port 8036)
          proxy_pass http://ai-automation-service-new:8025/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
      }

      location /weather/ {
          # Proxy to weather-api - use variable with resolver for dynamic DNS resolution
          # This allows nginx to start even if weather-api is not running
          set $weather_service "http://weather-api:8009";
          proxy_pass $weather_service/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      # Proxy setup-service requests to ha-setup-service
      # Using direct proxy_pass for reliable path forwarding
      # The trailing slash in proxy_pass strips /setup-service/ prefix
      location /setup-service/ {
          proxy_pass http://ha-setup-service:8020/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /rag-service/ {
          # Proxy to rag-service (port 8027) - Retrieval-Augmented Generation service
          proxy_pass http://rag-service:8027/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
      }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}