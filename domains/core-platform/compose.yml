# domains/core-platform/compose.yml — Group 1: core-platform
# The data backbone. If this is down, everything is down.
# Deploy cadence: Low — changes require staging + canary
#
# Services: influxdb, postgres, data-api, websocket-ingestion, admin-api, health-dashboard, data-retention, ha-simulator
# Depends on: Nothing (root of dependency tree)
# Depended on by: All other groups

services:
  influxdb:
    image: influxdb:2.8.0
    container_name: homeiq-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-admin123}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-homeiq}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-home_assistant_events}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-homeiq-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=influxdb,group=core-platform,environment=production"

  postgres:
    image: postgres:17-alpine
    container_name: homeiq-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      - POSTGRES_DB=homeiq
      - POSTGRES_USER=${POSTGRES_USER:-homeiq}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-homeiq-secure-2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infrastructure/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ../../infrastructure/postgres/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql:ro
      - ../../infrastructure/postgres/init-monitoring.sql:/docker-entrypoint-initdb.d/02-monitoring.sql:ro
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homeiq} -d homeiq"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=postgres,group=core-platform,environment=production"

  data-api:
    build:
      context: ../..
      dockerfile: domains/core-platform/data-api/Dockerfile
    container_name: homeiq-data-api
    restart: unless-stopped
    ports:
      - "8006:8006"
    env_file:
      - ../../.env
    environment:
      - DATA_API_HOST=0.0.0.0
      - DATA_API_PORT=8006
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-homeiq-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-homeiq}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-home_assistant_events}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_AUTH=true
      - API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
      - CORS_ORIGINS=http://localhost:3000,http://localhost
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-production}
      - OTLP_ENDPOINT=http://jaeger:4317
      - POSTGRES_URL=postgresql+asyncpg://${POSTGRES_USER:-homeiq}:${POSTGRES_PASSWORD:-homeiq-secure-2026}@postgres:5432/homeiq
    volumes:
    depends_on:
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=data-api,group=core-platform,environment=production"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  websocket-ingestion:
    build:
      context: ../..
      dockerfile: domains/core-platform/websocket-ingestion/Dockerfile
    container_name: homeiq-websocket
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    environment:
      - DOCKER_CONTAINER=true
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-production}
      - HA_HTTP_URL=${HA_HTTP_URL:-}
      - HA_WS_URL=${HA_WS_URL:-}
      - HA_TOKEN=${HA_TOKEN:-}
      - NABU_CASA_URL=${NABU_CASA_URL:-}
      - NABU_CASA_TOKEN=${NABU_CASA_TOKEN:-}
      - DATA_API_URL=http://data-api:8006
      - WEBSOCKET_INGESTION_PORT=8001
      - ENABLE_HOME_ASSISTANT=true
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_USERNAME=admin
      - INFLUXDB_PASSWORD=admin123
      - INFLUXDB_ORG=${INFLUXDB_ORG:-ha-ingestor}
      - INFLUXDB_BUCKET=home_assistant_events
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-ha-ingestor-token}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-/app/logs}
      - LOG_FORMAT=json
      - LOG_OUTPUT=both
      - API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
      - WEBSOCKET_MAX_RETRIES=${WEBSOCKET_MAX_RETRIES:--1}
      - WEBSOCKET_MAX_RETRY_DELAY=${WEBSOCKET_MAX_RETRY_DELAY:-300}
      - STORE_DEVICE_HISTORY_IN_INFLUXDB=${STORE_DEVICE_HISTORY_IN_INFLUXDB:-false}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - WEATHER_API_URL=${WEATHER_API_URL:-https://api.openweathermap.org/data/2.5}
      - WEATHER_DEFAULT_LOCATION=${WEATHER_DEFAULT_LOCATION:-Las Vegas,NV,US}
      - WEATHER_ENRICHMENT_ENABLED=${WEATHER_ENRICHMENT_ENABLED:-true}
      - WEATHER_CACHE_MINUTES=${WEATHER_CACHE_MINUTES:-15}
      - WEATHER_RATE_LIMIT_PER_MINUTE=${WEATHER_RATE_LIMIT_PER_MINUTE:-50}
      - WEATHER_RATE_LIMIT_PER_DAY=${WEATHER_RATE_LIMIT_PER_DAY:-900}
      - WEATHER_REQUEST_TIMEOUT=${WEATHER_REQUEST_TIMEOUT:-10}
      - OTLP_ENDPOINT=http://jaeger:4317
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=websocket-ingestion,group=core-platform,environment=production"
    volumes:
      - homeiq_logs:/var/log/homeiq
    depends_on:
      data-api:
        condition: service_healthy
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  admin-api:
    build:
      context: ../..
      dockerfile: domains/core-platform/admin-api/Dockerfile
    container_name: homeiq-admin
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file:
      - ../../.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../infrastructure:/app/infrastructure:rw
      - ../../docker-compose.yml:/app/docker-compose.yml:ro
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-/app/logs}
      - LOG_FORMAT=json
      - API_HOST=0.0.0.0
      - API_PORT=8004
      - API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
      - ENABLE_AUTH=false
      - DOCKER_HOST=unix:///var/run/docker.sock
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - HA_HTTP_URL=${HA_HTTP_URL:-${HOME_ASSISTANT_URL:-}}
      - HA_URL=${HA_HTTP_URL:-${HOME_ASSISTANT_URL:-http://192.168.1.86:8123}}
      - HA_TOKEN=${HOME_ASSISTANT_TOKEN:-}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-homeiq-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-homeiq}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-home_assistant_events}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-jwt-key}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-adminpass}
      - WEBSOCKET_INGESTION_URL=http://websocket-ingestion:8001
      - DATA_API_URL=http://data-api:8006
      - DEVICE_INTELLIGENCE_API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
      - AI_AUTOMATION_URL=http://ai-automation-service-new:8025
      - WEATHER_SERVICE_URL=http://weather-api:8009
      - OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      influxdb:
        condition: service_healthy
      websocket-ingestion:
        condition: service_started
      data-api:
        condition: service_healthy
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=admin-api,group=core-platform,environment=production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  health-dashboard:
    build:
      context: health-dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=
        - VITE_API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
        - VITE_DATA_API_URL=
        - VITE_WS_URL=ws://localhost:8001/ws
        - VITE_ENVIRONMENT=production
    container_name: homeiq-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=
      - VITE_API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
      - VITE_DATA_API_URL=
      - VITE_WS_URL=ws://localhost:8001/ws
      - VITE_ENVIRONMENT=production
    depends_on:
      admin-api:
        condition: service_healthy
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=health-dashboard,group=core-platform,environment=production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  data-retention:
    build:
      context: ../..
      dockerfile: domains/core-platform/data-retention/Dockerfile
    container_name: homeiq-data-retention
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ../../.env
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-homeiq-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-homeiq}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-home_assistant_events}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-/app/logs}
      - LOG_FORMAT=json
      - CLEANUP_INTERVAL_HOURS=${CLEANUP_INTERVAL_HOURS:-24}
      - MONITORING_INTERVAL_MINUTES=${MONITORING_INTERVAL_MINUTES:-5}
      - COMPRESSION_INTERVAL_HOURS=${COMPRESSION_INTERVAL_HOURS:-24}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-24}
      - BACKUP_DIR=${BACKUP_DIR:-/backups}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=data-retention,group=core-platform,environment=production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - data_retention_backups:/backups

  ha-simulator:
    build:
      context: ../..
      dockerfile: domains/core-platform/ha-simulator/Dockerfile
    container_name: homeiq-ha-simulator
    restart: unless-stopped
    ports:
      - "8125:8123"
    env_file:
      - ../../.env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - homeiq-network
    profiles:
      - development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ha-simulator,group=core-platform,environment=development"

  # --- Monitoring infrastructure ---

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: homeiq-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ../../infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infrastructure/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=prometheus,group=core-platform,environment=production"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: homeiq-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=homeiq
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=grafana,group=core-platform,environment=production"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: homeiq-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-homeiq}:${POSTGRES_PASSWORD:-homeiq-secure-2026}@postgres:5432/homeiq?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=postgres-exporter,group=core-platform,environment=production"

  # --- Test profile services ---

  home-assistant-test:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeiq-ha-test
    restart: unless-stopped
    ports:
      - "8124:8123"
    volumes:
      - ha_test_config:/config
      - ha_test_data:/data
    environment:
      - TZ=${TZ:-America/Los_Angeles}
    networks:
      - homeiq-network
    profiles:
      - test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ha-test,group=core-platform,environment=test"

  websocket-ingestion-test:
    build:
      context: websocket-ingestion
      dockerfile: Dockerfile
    container_name: homeiq-websocket-test
    restart: unless-stopped
    ports:
      - "8002:8001"
    env_file:
      - ../../.env
    environment:
      - DOCKER_CONTAINER=true
      - DEPLOYMENT_MODE=test
      - HA_HTTP_URL=http://home-assistant-test:8123
      - HA_WS_URL=http://home-assistant-test:8123/api/websocket
      - HA_TOKEN=${HA_TEST_TOKEN:-}
      - DATA_API_URL=http://data-api:8006
      - WEBSOCKET_INGESTION_PORT=8001
      - ENABLE_HOME_ASSISTANT=true
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_USERNAME=admin
      - INFLUXDB_PASSWORD=admin123
      - INFLUXDB_ORG=homeiq-test
      - INFLUXDB_BUCKET=home_assistant_events_test
      - INFLUXDB_TOKEN=homeiq-test-token
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-/app/logs}
      - LOG_FORMAT=json
      - LOG_OUTPUT=both
      - API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
      - WEBSOCKET_MAX_RETRIES=${WEBSOCKET_MAX_RETRIES:--1}
      - WEBSOCKET_MAX_RETRY_DELAY=${WEBSOCKET_MAX_RETRY_DELAY:-300}
      - STORE_DEVICE_HISTORY_IN_INFLUXDB=${STORE_DEVICE_HISTORY_IN_INFLUXDB:-false}
    depends_on:
      home-assistant-test:
        condition: service_healthy
    networks:
      - homeiq-network
    profiles:
      - test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=websocket-ingestion-test,group=core-platform,environment=test"
    volumes:
      - homeiq_logs:/var/log/homeiq

# Core-platform volumes (shared across groups via external references)
volumes:
  influxdb_data:
  influxdb_config:
  postgres_data:
  homeiq_logs:
  data_retention_backups:
  prometheus_data:
  grafana_data:
  ha_test_config:
  ha_test_data:

# Core-platform defines the shared network
networks:
  homeiq-network:
    name: homeiq-network
    driver: bridge
