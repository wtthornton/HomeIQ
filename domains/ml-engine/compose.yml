# domains/ml-engine/compose.yml — ML model inference, embedding generation, and training
# Deploy cadence: Frequent — model updates, library upgrades
#
# Services: openvino-service, ml-service, ner-service, openai-service, rag-service,
#           ai-core-service, ai-training-service, device-intelligence-service, model-prep
# Depends on: core-platform (data-api for entity/device metadata)
# Depended on by: automation-core (ML inference via ai-core-service)

services:
  openvino-service:
    build:
      context: ../..
      dockerfile: domains/ml-engine/openvino-service/Dockerfile
    container_name: homeiq-openvino-service
    restart: unless-stopped
    ports:
      - "8026:8019"
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8019/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=openvino-models,group=ml-engine,environment=production"

  ml-service:
    build:
      context: ../..
      dockerfile: domains/ml-engine/ml-service/Dockerfile
    container_name: homeiq-ml-service
    restart: unless-stopped
    ports:
      - "8025:8020"
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ml-algorithms,group=ml-engine,environment=production"

  ner-service:
    build:
      context: ../archive/2025-q4/ai-automation-service
      dockerfile: docker/ner-service.Dockerfile
    container_name: homeiq-ner-service
    restart: unless-stopped
    expose:
      - "8031"
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8031/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ner-model,group=ml-engine,environment=production"

  openai-service:
    build:
      context: ../archive/2025-q4/ai-automation-service
      dockerfile: docker/openai-service.Dockerfile
    container_name: homeiq-openai-service
    restart: unless-stopped
    ports:
      - "8020:8020"
    env_file:
      - ../../infrastructure/env.ai-automation
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=openai-client,group=ml-engine,environment=production"

  rag-service:
    build:
      context: ../..
      dockerfile: domains/ml-engine/rag-service/Dockerfile
    container_name: homeiq-rag-service
    restart: unless-stopped
    ports:
      - "8027:8027"
    env_file:
      - ../../.env
    environment:
      - RAG_SERVICE_PORT=8027
      - RAG_SERVICE_HOST=0.0.0.0
      - RAG_DATABASE_PATH=/app/data/rag_service.db
      - RAG_OPENVINO_SERVICE_URL=http://openvino-service:8019
      - RAG_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RAG_CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - ./rag-service/data:/app/data
    networks:
      - homeiq-network
    depends_on:
      openvino-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8027/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=rag-service,group=ml-engine,environment=production"

  ai-core-service:
    build:
      context: ../..
      dockerfile: domains/ml-engine/ai-core-service/Dockerfile
    container_name: homeiq-ai-core-service
    restart: unless-stopped
    ports:
      - "8018:8018"
    env_file:
      - ../../infrastructure/env.ai-automation
    environment:
      - OPENVINO_SERVICE_URL=http://openvino-service:8019
      - ML_SERVICE_URL=http://ml-service:8020
      - NER_SERVICE_URL=http://ner-service:8031
      - OPENAI_SERVICE_URL=http://openai-service:8020
    depends_on:
      openvino-service:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      ner-service:
        condition: service_healthy
      openai-service:
        condition: service_healthy
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8018/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ai-orchestrator,group=ml-engine,environment=production"

  ai-training-service:
    build:
      context: ../..
      dockerfile: domains/ml-engine/ai-training-service/Dockerfile
    container_name: homeiq-ai-training-service
    restart: unless-stopped
    ports:
      - "8033:8022"
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_automation.db
      - DATABASE_PATH=/app/data/ai_automation.db
      - TRAINING_SCRIPT_PATH=/app/scripts/train_soft_prompt.py
      - SOFT_PROMPT_MODEL_DIR=/app/models/soft_prompts
      - MODEL_STORAGE_DIR=/app/models
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - ai_automation_data:/app/data
      - ai_automation_models:/app/models
      - ../archive/2025-q4/ai-automation-service/scripts:/app/scripts:ro
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8022/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ai-training,group=ml-engine,environment=production"

  device-intelligence-service:
    build:
      context: ../..
      dockerfile: domains/ml-engine/device-intelligence-service/Dockerfile
    container_name: homeiq-device-intelligence
    restart: unless-stopped
    ports:
      - "8028:8019"
    extra_hosts:
      - "homeassistant:192.168.1.86"
    env_file:
      - ../../.env
    environment:
      - DEVICE_INTELLIGENCE_PORT=${DEVICE_INTELLIGENCE_PORT:-8019}
      - DEVICE_INTELLIGENCE_HOST=${DEVICE_INTELLIGENCE_HOST:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SQLITE_DATABASE_URL=${SQLITE_DATABASE_URL:-sqlite:///./data/device_intelligence.db}
      - HA_URL=${HA_HTTP_URL:-${HOME_ASSISTANT_URL:-http://homeassistant:8123}}
      - HA_WS_URL=${HA_WS_URL:-}
      - NABU_CASA_URL=https://lwzisze94hrpqde9typkwgu5pptxdkoh.ui.nabu.casa
      - HA_TOKEN=${HOME_ASSISTANT_TOKEN:-}
      - MQTT_BROKER=${MQTT_BROKER:-mqtt://192.168.1.86:1883}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - ZIGBEE2MQTT_BASE_TOPIC=${ZIGBEE2MQTT_BASE_TOPIC:-zigbee2mqtt}
      - MAX_WORKERS=${MAX_WORKERS:-4}
      - REQUEST_TIMEOUT=30
      - CACHE_TTL=300
      - MAX_CACHE_SIZE=1000
      - ML_FAILURE_MODEL=${ML_FAILURE_MODEL:-randomforest}
      - ML_USE_INCREMENTAL=${ML_USE_INCREMENTAL:-false}
      - ML_INCREMENTAL_UPDATE_THRESHOLD=${ML_INCREMENTAL_UPDATE_THRESHOLD:-100}
      - GNN_USE_COMPILE=${GNN_USE_COMPILE:-true}
    volumes:
      - device_intelligence_data:/app/data
      - ../../infrastructure:/app/infrastructure:rw
    # Cross-group depends_on removed (influxdb is in core-platform)
    networks:
      - homeiq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8019/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=device-intelligence,group=ml-engine,environment=production"

  model-prep:
    build:
      context: ../..
      dockerfile: domains/ml-engine/model-prep/Dockerfile
    container_name: homeiq-model-prep
    restart: "no"
    environment:
      - HF_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models
    volumes:
      - ai_automation_models:/app/models
    networks:
      - homeiq-network
    profiles:
      - development
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=model-prep,group=ml-engine,environment=development"

# ML-engine volumes
volumes:
  ai_automation_data:
  ai_automation_models:
  device_intelligence_data:

networks:
  homeiq-network:
    external: true
