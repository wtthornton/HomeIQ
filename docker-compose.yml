# docker-compose.yml — HomeIQ Service Orchestrator
#
# This file uses the Docker Compose `include` directive (v2.20+) to compose
# 9 independently deployable domain groups from co-located compose files.
#
# ONLY CONFIG: Run by domain — never use this file to start the full stack.
#   Full stack: .\scripts\start-stack.ps1 (Windows) or ./scripts/start-stack.sh (Linux/Mac)
#   Single domain: docker compose -f domains/<domain>/compose.yml --profile production up -d
#   See: docs/deployment/DEPLOYMENT_QUICK_REFERENCE.md
#
# Usage (root compose — for CI/rebuild only; creates merged "homeiq" project):
#   Full stack (by domain, recommended):
#     .\scripts\start-stack.ps1          # Windows
#     ./scripts/start-stack.sh            # Linux/Mac
#   Full stack (merged into one project, all under "homeiq"):
#     docker compose --profile production up -d
#   Single domain:     docker compose -f domains/core-platform/compose.yml up -d
#   Core + collectors: docker compose -f domains/core-platform/compose.yml \
#                                     -f domains/data-collectors/compose.yml up -d
#   With dev tools:    docker compose --profile development up -d
#   Parallel builds:   docker buildx bake full
#   Domain builds:     docker buildx bake core-platform
#
# Domain dependency order (start in this order for clean startup):
#   1. core-platform      (influxdb, data-api, websocket, admin, dashboard, retention, ha-simulator)
#   2. data-collectors    (weather, smart-meter, sports, air-quality, carbon, electricity, calendar, log-aggregator, zeek, zeek-network-service)
#   3. ml-engine          (openvino, ml, ner, openai, rag, ai-core, training, device-intel, model-prep)
#   4. automation-core    (ha-ai-agent, ai-automation, query, yaml-validation, linter, code-executor, traces)
#   5. blueprints         (blueprint-index, blueprint-suggestion, rule-recommendation, automation-miner)
#   6. energy-analytics   (energy-correlator, energy-forecasting, proactive-agent)
#   7. device-management  (device-health, classifier, setup, db-client, recommender, activity, ha-setup)
#   8. pattern-analysis   (ai-pattern, api-automation-edge)
#   9. frontends          (jaeger, observability-dashboard, ai-automation-ui)

name: homeiq

# Core-platform MUST be first — it defines the homeiq-network bridge network.
# All other domains reference it as external: true.
include:
  - path: domains/core-platform/compose.yml
    env_file: .env
  - path: domains/data-collectors/compose.yml
    env_file: .env
  - path: domains/ml-engine/compose.yml
    env_file: .env
  - path: domains/automation-core/compose.yml
    env_file: .env
  - path: domains/blueprints/compose.yml
    env_file: .env
  - path: domains/energy-analytics/compose.yml
    env_file: .env
  - path: domains/device-management/compose.yml
    env_file: .env
  - path: domains/pattern-analysis/compose.yml
    env_file: .env
  - path: domains/frontends/compose.yml
    env_file: .env
