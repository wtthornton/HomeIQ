# docker-compose.yml — HomeIQ Service Orchestrator
#
# This file uses the Docker Compose `include` directive (v2.20+) to compose
# 6 independently deployable service groups from separate compose files.
#
# Usage:
#   Full stack:       docker compose up -d
#   Core only:        docker compose -f compose/core.yml up -d
#   Core + collectors: docker compose -f compose/core.yml -f compose/collectors.yml up -d
#   With tests:       docker compose --profile test up -d
#   With dev tools:   docker compose --profile development up -d
#
# Group dependency order (start in this order for clean startup):
#   1. core-platform    (influxdb, data-api, websocket, admin, dashboard, retention)
#   2. data-collectors  (weather, smart-meter, sports, air-quality, carbon, electricity, calendar, log-aggregator)
#   3. ml-engine        (openvino, ml, ner, openai, rag, ai-core, training, device-intel, model-prep)
#   4. automation-intel  (ha-ai-agent, ai-automation, query, pattern, blueprints, energy, traces, ...)
#   5. device-mgmt      (device-health, classifier, setup, db-client, recommender, activity, ha-setup)
#   6. frontends        (jaeger, observability-dashboard, ai-automation-ui)
#   7. test             (home-assistant-test, websocket-test, ha-simulator)

name: homeiq

include:
  - path: compose/core.yml
    env_file: .env
  - path: compose/collectors.yml
    env_file: .env
  - path: compose/ml.yml
    env_file: .env
  - path: compose/automation.yml
    env_file: .env
  - path: compose/devices.yml
    env_file: .env
  - path: compose/frontends.yml
    env_file: .env
  - path: compose/test.yml
    env_file: .env
