# compose/automation.yml — Group 4: automation-intelligence
# Everything related to automation generation, suggestion, validation, and deployment.
# Deploy cadence: High — most active feature development
#
# Services: ha-ai-agent-service, ai-automation-service-new, ai-query-service, ai-pattern-service,
#           ai-code-executor, automation-miner, automation-linter, yaml-validation-service,
#           blueprint-index, blueprint-suggestion-service, rule-recommendation-ml,
#           api-automation-edge, proactive-agent-service, energy-correlator, energy-forecasting,
#           automation-trace-service
# Depends on: Group 1 (data-api), Group 3 (ML inference via ai-core-service)
# Depended on by: Group 6 (frontends display automation results)

services:
  ha-ai-agent-service:
    build:
      context: ..
      dockerfile: services/ha-ai-agent-service/Dockerfile
    container_name: homeiq-ha-ai-agent-service
    restart: unless-stopped
    ports:
      - "8030:8030"
    env_file:
      - ../.env
    environment:
      - HA_URL=${HA_HTTP_URL:-http://homeassistant:8123}
      - HA_TOKEN=${HA_TOKEN:-}
      - DATA_API_URL=http://data-api:8006
      - DEVICE_INTELLIGENCE_URL=http://device-intelligence-service:8019
      - DEVICE_INTELLIGENCE_API_KEY=${API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.2-codex}
      - AI_AUTOMATION_API_KEY=${API_KEY:-}
      - DATA_API_KEY=${API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # Cross-group depends_on removed (data-api in core, device-intelligence in ml-engine)
    networks:
      - homeiq-network
    volumes:
      - ha_ai_agent_data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ha-ai-agent,group=automation-intelligence,environment=production"

  proactive-agent-service:
    build:
      context: ..
      dockerfile: services/proactive-agent-service/Dockerfile
    container_name: homeiq-proactive-agent-service
    restart: unless-stopped
    ports:
      - "8031:8031"
    env_file:
      - ../.env
    environment:
      - HA_AI_AGENT_URL=http://ha-ai-agent-service:8030
      - WEATHER_API_URL=http://weather-api:8009
      - CARBON_INTENSITY_URL=http://carbon-intensity:8010
      - DATA_API_URL=http://data-api:8006
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-mini}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
      - SCHEDULER_TIME=${SCHEDULER_TIME:-03:00}
    depends_on:
      ha-ai-agent-service:
        condition: service_healthy
      # Cross-group depends_on removed (data-api in core)
    networks:
      - homeiq-network
    volumes:
      - proactive_agent_data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8031/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=proactive-agent-service,group=automation-intelligence,environment=production"

  ai-code-executor:
    build:
      context: ..
      dockerfile: services/ai-code-executor/Dockerfile
    container_name: homeiq-ai-code-executor
    restart: unless-stopped
    expose:
      - "8030"
    environment:
      - EXECUTION_TIMEOUT=30
      - MAX_MEMORY_MB=128
      - MAX_CPU_PERCENT=50.0
      - MCP_WORKSPACE_DIR=/tmp/mcp_workspace
      - LOG_LEVEL=INFO
    depends_on:
      ai-automation-service-new:
        condition: service_healthy
      # Cross-group depends_on removed (data-api in core)
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.5'
        reservations:
          memory: 96M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8030/health', timeout=5.0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ai-code-executor,group=automation-intelligence,environment=production"

  ai-pattern-service:
    build:
      context: ..
      dockerfile: services/ai-pattern-service/Dockerfile
    container_name: ai-pattern-service
    restart: unless-stopped
    ports:
      - "8034:8020"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_automation.db
      - DATABASE_PATH=/app/data/ai_automation.db
      - DATA_API_URL=http://data-api:8006
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MQTT_BROKER=${MQTT_BROKER:-}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - ai_automation_data:/app/data
    networks:
      - homeiq-network
    # Cross-group depends_on removed (data-api in core)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ai-pattern-service,group=automation-intelligence,environment=production"

  ai-query-service:
    build:
      context: ..
      dockerfile: services/ai-query-service/Dockerfile
    container_name: homeiq-ai-query-service
    restart: unless-stopped
    ports:
      - "8035:8018"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_automation.db
      - DATABASE_PATH=/app/data/ai_automation.db
      - DATA_API_URL=http://data-api:8006
      - HA_URL=${HA_HTTP_URL:-}
      - HA_TOKEN=${HA_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-mini}
      - DEVICE_INTELLIGENCE_URL=http://device-intelligence-service:8023
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - QUERY_TIMEOUT=${QUERY_TIMEOUT:-5.0}
      - ENABLE_CACHING=${ENABLE_CACHING:-True}
      - OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - ai_automation_data:/app/data
      - ai_automation_models:/app/models
    networks:
      - homeiq-network
    # Cross-group depends_on removed (data-api in core)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8018/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ai-query-service,group=automation-intelligence,environment=production"

  yaml-validation-service:
    build:
      context: ..
      dockerfile: services/yaml-validation-service/Dockerfile
    container_name: homeiq-yaml-validation-service
    restart: unless-stopped
    ports:
      - "8037:8037"
    env_file:
      - ../.env
    environment:
      - DATA_API_URL=http://data-api:8006
      - DATA_API_KEY=${API_KEY:-}
      - HA_URL=${HOME_ASSISTANT_URL:-http://192.168.1.86:8123}
      - HA_TOKEN=${HOME_ASSISTANT_TOKEN:-}
      - SERVICE_PORT=8037
      - VALIDATION_LEVEL=moderate
      - ENABLE_NORMALIZATION=true
      - ENABLE_ENTITY_VALIDATION=true
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # Cross-group depends_on removed (data-api in core)
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8037/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=yaml-validation-service,group=automation-intelligence,environment=production"

  ai-automation-service-new:
    build:
      context: ..
      dockerfile: services/ai-automation-service-new/Dockerfile
    container_name: homeiq-ai-automation-service-new
    restart: unless-stopped
    ports:
      - "8036:8025"
    env_file:
      - ../.env
    environment:
      - DATA_API_URL=http://data-api:8006
      - QUERY_SERVICE_URL=http://ai-query-service:8018
      - PATTERN_SERVICE_URL=http://ai-pattern-service:8020
      - YAML_VALIDATION_SERVICE_URL=http://yaml-validation-service:8037
      - HA_URL=${HOME_ASSISTANT_URL:-http://192.168.1.86:8123}
      - HA_TOKEN=${HOME_ASSISTANT_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-mini}
      - OPENAI_YAML_MODEL=${OPENAI_YAML_MODEL:-gpt-5.2-codex}
      - OPENAI_REASONING_EFFORT=high
      - OPENAI_TIMEOUT=90
      - DATABASE_URL=sqlite+aiosqlite:////app/data/ai_automation.db
      - SERVICE_PORT=8025
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      yaml-validation-service:
        condition: service_healthy
      # Cross-group depends_on removed (data-api in core)
    volumes:
      - ai_automation_data:/app/data
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ai-automation-service-new,group=automation-intelligence,environment=production"

  api-automation-edge:
    build:
      context: ..
      dockerfile: services/api-automation-edge/Dockerfile
    container_name: homeiq-api-automation-edge
    restart: unless-stopped
    ports:
      - "8041:8025"
    env_file:
      - ../.env
    environment:
      - SERVICE_PORT=8025
      - SERVICE_NAME=api-automation-edge
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HA_URL=${HA_HTTP_URL:-${HOME_ASSISTANT_URL:-}}
      - HA_HTTP_URL=${HA_HTTP_URL:-}
      - HA_WS_URL=${HA_WS_URL:-}
      - HA_TOKEN=${HA_TOKEN:-${HOME_ASSISTANT_TOKEN:-}}
      - HOME_ID=${HOME_ID:-default}
      - DATABASE_URL=sqlite:////app/data/api-automation-edge.db
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-homeiq-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-homeiq}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-homeiq_metrics}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_DELAY=${RETRY_DELAY:-1.0}
      - TIMEOUT=${TIMEOUT:-10.0}
      - CIRCUIT_BREAKER_FAILURE_THRESHOLD=${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}
      - CIRCUIT_BREAKER_TIMEOUT=${CIRCUIT_BREAKER_TIMEOUT:-60.0}
      - WS_PING_INTERVAL=${WS_PING_INTERVAL:-20}
      - WS_RECONNECT_DELAY=${WS_RECONNECT_DELAY:-5.0}
      - CAPABILITY_GRAPH_REFRESH_INTERVAL=${CAPABILITY_GRAPH_REFRESH_INTERVAL:-300}
      - CAPABILITY_GRAPH_CACHE_TTL=${CAPABILITY_GRAPH_CACHE_TTL:-600}
      - OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - api_automation_edge_data:/app/data
    # Cross-group depends_on removed (influxdb + data-api in core)
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=api-automation-edge,group=automation-intelligence,environment=production"

  blueprint-index:
    build:
      context: ../services/blueprint-index
      dockerfile: Dockerfile
    container_name: homeiq-blueprint-index
    restart: unless-stopped
    ports:
      - "8038:8031"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/blueprint_index.db
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SERVICE_PORT=8031
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - blueprint_index_data:/app/data
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8031/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=blueprint-index,group=automation-intelligence,environment=production"

  blueprint-suggestion-service:
    build:
      context: ../services/blueprint-suggestion-service
      dockerfile: Dockerfile
    container_name: homeiq-blueprint-suggestion
    restart: unless-stopped
    ports:
      - "8039:8032"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/blueprint_suggestions.db
      - BLUEPRINT_INDEX_URL=http://blueprint-index:8031
      - DATA_API_URL=http://data-api:8006
      - AI_PATTERN_SERVICE_URL=http://ai-pattern-service:8029
      - SERVICE_PORT=8032
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - blueprint_suggestions_data:/app/data
    networks:
      - homeiq-network
    depends_on:
      - blueprint-index
      # Cross-group depends_on removed (data-api in core)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8032/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=blueprint-suggestion,group=automation-intelligence,environment=production"

  rule-recommendation-ml:
    build:
      context: ../services/rule-recommendation-ml
      dockerfile: Dockerfile
    container_name: homeiq-rule-recommendation-ml
    restart: unless-stopped
    ports:
      - "8040:8035"
    environment:
      - PORT=8035
      - HOST=0.0.0.0
      - MODEL_PATH=./models/rule_recommender.pkl
      - DEBUG=false
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - rule_recommendation_models:/app/models
    networks:
      - homeiq-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; import sys; response = urllib.request.urlopen('http://localhost:8035/api/v1/health', timeout=5); sys.exit(0 if response.getcode() == 200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=rule-recommendation-ml,group=automation-intelligence,environment=production"

  automation-miner:
    build:
      context: ..
      dockerfile: services/automation-miner/Dockerfile
    container_name: homeiq-automation-miner
    restart: unless-stopped
    ports:
      - "8029:8019"
    env_file:
      - ../infrastructure/env.automation-miner
    environment:
      - ENABLE_AUTOMATION_MINER=true
      - MINER_DB_PATH=data/automation_miner.db
      - DISCOURSE_BASE_URL=https://community.home-assistant.io
      - DISCOURSE_MIN_LIKES=${DISCOURSE_MIN_LIKES:-300}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - automation_miner_data:/app/data
    networks:
      - homeiq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8019/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=automation-miner,group=automation-intelligence,environment=production"

  automation-linter:
    build:
      context: ..
      dockerfile: services/automation-linter/Dockerfile
    container_name: homeiq-automation-linter
    restart: unless-stopped
    ports:
      - "8016:8020"
    environment:
      - LOG_LEVEL=INFO
      - MAX_YAML_SIZE_BYTES=500000
      - PROCESSING_TIMEOUT_SECONDS=30
    volumes:
      - ../services/automation-linter/src:/app/src
      - ../services/automation-linter/ui:/app/ui
      - ../shared/ha_automation_lint:/app/shared/ha_automation_lint
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8020/health', timeout=5.0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=automation-linter,group=automation-intelligence,environment=production"

  energy-correlator:
    build:
      context: ..
      dockerfile: services/energy-correlator/Dockerfile
    container_name: homeiq-energy-correlator
    restart: unless-stopped
    ports:
      - "8017:8017"
    env_file:
      - ../.env
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-homeiq-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-homeiq}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-home_assistant_events}
      - PROCESSING_INTERVAL=${ENERGY_CORRELATION_INTERVAL:-60}
      - LOOKBACK_MINUTES=${ENERGY_LOOKBACK_MINUTES:-5}
      - SERVICE_PORT=8017
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # Cross-group depends_on removed (influxdb in core, smart-meter in collectors)
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=energy-correlator,group=automation-intelligence,environment=production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8017/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  energy-forecasting:
    build:
      context: ../services/energy-forecasting
      dockerfile: Dockerfile
    container_name: homeiq-energy-forecasting
    restart: unless-stopped
    ports:
      - "8042:8037"
    env_file:
      - ../.env
    environment:
      - PORT=8037
      - HOST=0.0.0.0
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-homeiq-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-homeiq}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-home_assistant_events}
      - MODEL_PATH=${ENERGY_MODEL_PATH:-/app/models/energy_forecaster}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - energy_forecasting_models:/app/models
    # Cross-group depends_on removed (influxdb in core)
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8037/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=energy-forecasting,group=automation-intelligence,environment=production"

  automation-trace-service:
    build:
      context: ..
      dockerfile: services/automation-trace-service/Dockerfile
    container_name: homeiq-automation-trace-service
    restart: unless-stopped
    ports:
      - "8044:8020"
    extra_hosts:
      - "homeassistant:192.168.1.86"
    env_file:
      - ../.env
    environment:
      - SERVICE_PORT=8020
      - HA_WS_URL=${HA_WS_URL:-ws://homeassistant:8123}
      - HA_HTTP_URL=${HA_HTTP_URL:-http://homeassistant:8123}
      - HA_TOKEN=${HA_TOKEN}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-homeiq-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-homeiq}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-home_assistant_events}
      - DATA_API_URL=http://data-api:8006
      - DATA_API_API_KEY=${DATA_API_API_KEY:-}
      - TRACE_POLL_INTERVAL_SECONDS=${TRACE_POLL_INTERVAL_SECONDS:-120}
      - LOGBOOK_POLL_INTERVAL_SECONDS=${LOGBOOK_POLL_INTERVAL_SECONDS:-300}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # Cross-group depends_on removed (influxdb + data-api in core)
    networks:
      - homeiq-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=automation-trace-service,group=automation-intelligence,environment=production"

# Automation-intelligence volumes
volumes:
  ai_automation_data:  # Shared with ml-engine (ai-training-service)
  ai_automation_models:  # Shared with ml-engine
  ha_ai_agent_data:
  proactive_agent_data:
  blueprint_index_data:
  blueprint_suggestions_data:
  rule_recommendation_models:
  api_automation_edge_data:
  automation_miner_data:
  energy_forecasting_models:

networks:
  homeiq-network:
    external: true
