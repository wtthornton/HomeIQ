# compose/test.yml — Test and development profile services
# These services are only started with explicit profile activation.
#
# Services: home-assistant-test (test), websocket-ingestion-test (test), ha-simulator (development)

services:
  home-assistant-test:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeiq-ha-test
    restart: unless-stopped
    ports:
      - "8124:8123"
    volumes:
      - ha_test_config:/config
      - ha_test_data:/data
    environment:
      - TZ=${TZ:-America/Los_Angeles}
    networks:
      - homeiq-network
    profiles:
      - test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ha-test,group=test,environment=test"

  websocket-ingestion-test:
    build:
      context: ../services/websocket-ingestion
      dockerfile: Dockerfile
    container_name: homeiq-websocket-test
    restart: unless-stopped
    ports:
      - "8002:8001"
    env_file:
      - ../.env
    environment:
      - DOCKER_CONTAINER=true
      - DEPLOYMENT_MODE=test
      - HA_HTTP_URL=http://home-assistant-test:8123
      - HA_WS_URL=http://home-assistant-test:8123/api/websocket
      - HA_TOKEN=${HA_TEST_TOKEN:-}
      - DATA_API_URL=http://data-api:8006
      - WEBSOCKET_INGESTION_PORT=8001
      - ENABLE_HOME_ASSISTANT=true
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_USERNAME=admin
      - INFLUXDB_PASSWORD=admin123
      - INFLUXDB_ORG=homeiq-test
      - INFLUXDB_BUCKET=home_assistant_events_test
      - INFLUXDB_TOKEN=homeiq-test-token
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-/app/logs}
      - LOG_FORMAT=json
      - LOG_OUTPUT=both
      - API_KEY=${API_KEY:-hs_P3rU9kQ2xZp6vL1fYc7bN4sTqD8mA0wR}
      - WEBSOCKET_MAX_RETRIES=${WEBSOCKET_MAX_RETRIES:--1}
      - WEBSOCKET_MAX_RETRY_DELAY=${WEBSOCKET_MAX_RETRY_DELAY:-300}
      - STORE_DEVICE_HISTORY_IN_INFLUXDB=${STORE_DEVICE_HISTORY_IN_INFLUXDB:-false}
    depends_on:
      home-assistant-test:
        condition: service_healthy
      # Cross-group depends_on removed (data-api + influxdb in core)
    networks:
      - homeiq-network
    profiles:
      - test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=websocket-ingestion-test,group=test,environment=test"
    volumes:
      - homeiq_logs:/var/log/homeiq

  ha-simulator:
    build:
      context: ..
      dockerfile: services/ha-simulator/Dockerfile
    container_name: homeiq-ha-simulator
    restart: unless-stopped
    ports:
      - "8125:8123"
    env_file:
      - ../.env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - homeiq-network
    profiles:
      - development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ha-simulator,group=test,environment=development"

# Test volumes
volumes:
  ha_test_config:
  ha_test_data:
  homeiq_logs:

networks:
  homeiq-network:
    external: true
