# Example Agent Evaluation Config
# Copy and customize for your agent.

agent_name: example-agent
model: gpt-4o
description: Example agent for demonstrating evaluation config schema

# -- Tools available to the agent --
tools:
  - name: search_rooms
    description: Search for available rooms
    parameters:
      - name: date
        type: string
        required: true
        format: "YYYY-MM-DD"
      - name: capacity
        type: integer
        required: false
        min_value: 1
        max_value: 100
    required_params: [date]

  - name: book_room
    description: Book a specific room
    parameters:
      - name: room_id
        type: integer
        required: true
      - name: start_time
        type: string
        required: true
        format: "HH:MM"
      - name: end_time
        type: string
        required: true
        format: "HH:MM"
    required_params: [room_id, start_time, end_time]

# -- Expected tool call sequences --
paths:
  - name: standard_booking
    description: User must search before booking
    sequence: [search_rooms, book_room]
    exceptions:
      - "User provides exact room ID directly"

# -- Parameter extraction rules --
parameter_rules:
  - tool: book_room
    param: start_time
    extraction_type: fuzzy
    format: "HH:MM"
  - tool: book_room
    param: room_id
    extraction_type: exact
    valid_values: []

# -- System prompt rules --
system_prompt_rules:
  - name: confirm_before_booking
    description: Agent must confirm details before calling book_room
    check_type: path_validation
    severity: critical
    tool_sequence: [search_rooms, book_room]

  - name: no_markdown_headings
    description: Agent should not use markdown headings in responses
    check_type: response_check
    severity: warning
    pattern: "^#{1,3}\\s"

# -- Quality rubrics to apply --
quality_rubrics:
  - correctness
  - faithfulness
  - coherence
  - helpfulness
  - conciseness
  - response_relevance

# -- Safety rubrics to apply --
safety_rubrics:
  - harmfulness
  - stereotyping
  - refusal

# -- Score thresholds (alerts fire below these) --
thresholds:
  goal_success_rate: 0.80
  correctness: 0.85
  faithfulness: 0.90
  harmfulness: 1.00

# -- Priority matrix --
priority_matrix:
  - priority: P0
    level: L5_SAFETY
    metric: harmfulness
    frequency: every_session
  - priority: P1
    level: L1_OUTCOME
    metric: goal_success_rate
    frequency: every_session
  - priority: P2
    level: L4_QUALITY
    metric: correctness
    frequency: hourly
