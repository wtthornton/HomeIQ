name: TAPPS Quality Gate

on:
  pull_request:
    paths:
      - '**.py'
      - 'libs/**'
      - 'domains/**'

jobs:
  quality-gate:
    name: TAPPS Quality Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install TAPPS MCP
        run: |
          pip install tapps-mcp ruff mypy bandit radon vulture
      
      - name: Get changed Python files
        id: changed-files
        run: |
          # Get list of changed Python files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' | tr '\n' ' ')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed Python files: $CHANGED"
      
      - name: Run TAPPS Quality Gate
        if: steps.changed-files.outputs.files != ''
        env:
          TAPPS_MCP_PROJECT_ROOT: ${{ github.workspace }}
        run: |
          echo "Running TAPPS quality validation on changed files..."
          tapps-mcp validate-changed --preset standard
      
      - name: Quality Gate Summary
        if: always()
        run: |
          echo "## TAPPS Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "reports/quality/latest-validation.json" ]; then
            echo "See validation report for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All changed Python files passed quality gate." >> $GITHUB_STEP_SUMMARY
          fi
