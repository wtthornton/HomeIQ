name: "CI — Core Platform"

# Manual only — see workflows/README.md (was: push/PR + libs/** fan-out).
on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: core
      domain_dir: core-platform
      services: '["websocket-ingestion","data-api","admin-api","health-dashboard","data-retention"]'
