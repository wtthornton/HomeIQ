name: "CI \u2014 Core Platform"

on:
  push:
    paths:
      - 'services/websocket-ingestion/**'
      - 'services/data-api/**'
      - 'services/admin-api/**'
      - 'services/health-dashboard/**'
      - 'services/data-retention/**'
      - 'compose/core.yml'
      - 'shared/patterns/**'
      - '.github/workflows/ci-core.yml'
      - '.github/workflows/reusable-group-ci.yml'
  pull_request:
    paths:
      - 'services/websocket-ingestion/**'
      - 'services/data-api/**'
      - 'services/admin-api/**'
      - 'services/health-dashboard/**'
      - 'services/data-retention/**'
      - 'compose/core.yml'
      - 'shared/patterns/**'
      - '.github/workflows/ci-core.yml'
      - '.github/workflows/reusable-group-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: core
      services: '["websocket-ingestion","data-api","admin-api","health-dashboard","data-retention"]'
