name: "CI — Core Platform"

on:
  push:
    paths:
      - 'domains/core-platform/websocket-ingestion/**'
      - 'domains/core-platform/data-api/**'
      - 'domains/core-platform/admin-api/**'
      - 'domains/core-platform/health-dashboard/**'
      - 'domains/core-platform/data-retention/**'
      - 'domains/core-platform/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-core.yml'
      - '.github/workflows/reusable-group-ci.yml'
  pull_request:
    paths:
      - 'domains/core-platform/websocket-ingestion/**'
      - 'domains/core-platform/data-api/**'
      - 'domains/core-platform/admin-api/**'
      - 'domains/core-platform/health-dashboard/**'
      - 'domains/core-platform/data-retention/**'
      - 'domains/core-platform/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-core.yml'
      - '.github/workflows/reusable-group-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: core
      domain_dir: core-platform
      services: '["websocket-ingestion","data-api","admin-api","health-dashboard","data-retention"]'
