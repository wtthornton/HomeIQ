name: "CI — Frontends"

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-frontends-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: frontends
      domain_dir: frontends
      services: '["observability-dashboard","ai-automation-ui"]'
