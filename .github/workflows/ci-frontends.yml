name: "CI — Frontends"

on:
  push:
    paths:
      - 'domains/frontends/observability-dashboard/**'
      - 'domains/frontends/ai-automation-ui/**'
      - 'domains/frontends/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-frontends.yml'
      - '.github/workflows/reusable-group-ci.yml'
  pull_request:
    paths:
      - 'domains/frontends/observability-dashboard/**'
      - 'domains/frontends/ai-automation-ui/**'
      - 'domains/frontends/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-frontends.yml'
      - '.github/workflows/reusable-group-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-frontends-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: frontends
      domain_dir: frontends
      services: '["observability-dashboard","ai-automation-ui"]'
