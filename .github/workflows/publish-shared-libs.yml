name: "Publish Shared Libraries & Cascade"

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'libs/**'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

concurrency:
  group: publish-shared-libs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test Shared Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint shared libraries
        run: |
          for lib in libs/homeiq-*/; do
            if [ -d "$lib" ]; then
              echo "Linting $lib..."
              ruff check "$lib"
            fi
          done

      - name: Install shared libraries
        run: |
          for lib in libs/homeiq-*/; do
            if [ -d "$lib" ]; then
              pip install "$lib" 2>/dev/null || true
            fi
          done
          pip install pytest pytest-asyncio pytest-timeout 2>/dev/null || true

      - name: Run shared library tests
        run: |
          for lib in libs/homeiq-*/; do
            if [ -d "${lib}tests" ] && \
               [ -n "$(find ${lib}tests -name 'test_*.py' -o -name '*_test.py' 2>/dev/null)" ]; then
              echo "Testing $lib..."
              pytest "${lib}tests/" -v --timeout=300
            else
              echo "No tests found in $lib — skipping"
            fi
          done

  cascade-group-rebuilds:
    name: "Cascade — Trigger group CI"
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        workflow:
          - ci-core.yml
          - ci-collectors.yml
          - ci-ml.yml
          - ci-automation.yml
          - ci-blueprints.yml
          - ci-energy-analytics.yml
          - ci-pattern-analysis.yml
          - ci-devices.yml
          - ci-frontends.yml
      fail-fast: false
    steps:
      - name: Dispatch ${{ matrix.workflow }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '${{ matrix.workflow }}',
              ref: context.ref
            });
            console.log('Dispatched ${{ matrix.workflow }} on ref ' + context.ref);
