name: "CI — Energy Analytics"

on:
  push:
    paths:
      - 'domains/energy-analytics/energy-correlator/**'
      - 'domains/energy-analytics/energy-forecasting/**'
      - 'domains/energy-analytics/proactive-agent-service/**'
      - 'domains/energy-analytics/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-energy-analytics.yml'
      - '.github/workflows/reusable-group-ci.yml'
  pull_request:
    paths:
      - 'domains/energy-analytics/energy-correlator/**'
      - 'domains/energy-analytics/energy-forecasting/**'
      - 'domains/energy-analytics/proactive-agent-service/**'
      - 'domains/energy-analytics/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-energy-analytics.yml'
      - '.github/workflows/reusable-group-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-energy-analytics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: energy-analytics
      domain_dir: energy-analytics
      services: '["energy-correlator","energy-forecasting","proactive-agent-service"]'
