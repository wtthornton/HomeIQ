name: "CI — Energy Analytics"

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-energy-analytics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: energy-analytics
      domain_dir: energy-analytics
      services: '["energy-correlator","energy-forecasting","proactive-agent-service"]'
