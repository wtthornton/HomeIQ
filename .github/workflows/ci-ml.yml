name: "CI \u2014 ML Engine"

on:
  push:
    paths:
      - 'services/openvino-service/**'
      - 'services/ml-service/**'
      - 'services/ai-core-service/**'
      - 'services/ai-training-service/**'
      - 'services/device-intelligence-service/**'
      - 'services/rag-service/**'
      - 'services/model-prep/**'
      - 'compose/ml.yml'
      - 'shared/patterns/**'
      - '.github/workflows/ci-ml.yml'
      - '.github/workflows/reusable-group-ci.yml'
  pull_request:
    paths:
      - 'services/openvino-service/**'
      - 'services/ml-service/**'
      - 'services/ai-core-service/**'
      - 'services/ai-training-service/**'
      - 'services/device-intelligence-service/**'
      - 'services/rag-service/**'
      - 'services/model-prep/**'
      - 'compose/ml.yml'
      - 'shared/patterns/**'
      - '.github/workflows/ci-ml.yml'
      - '.github/workflows/reusable-group-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-ml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: ml
      services: '["openvino-service","ml-service","ai-core-service","ai-training-service","device-intelligence-service","rag-service","model-prep"]'
