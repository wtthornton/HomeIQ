name: "CI — ML Engine"

on:
  push:
    paths:
      - 'domains/ml-engine/openvino-service/**'
      - 'domains/ml-engine/ml-service/**'
      - 'domains/ml-engine/ai-core-service/**'
      - 'domains/ml-engine/ai-training-service/**'
      - 'domains/ml-engine/device-intelligence-service/**'
      - 'domains/ml-engine/rag-service/**'
      - 'domains/ml-engine/model-prep/**'
      - 'domains/ml-engine/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-ml.yml'
      - '.github/workflows/reusable-group-ci.yml'
  pull_request:
    paths:
      - 'domains/ml-engine/openvino-service/**'
      - 'domains/ml-engine/ml-service/**'
      - 'domains/ml-engine/ai-core-service/**'
      - 'domains/ml-engine/ai-training-service/**'
      - 'domains/ml-engine/device-intelligence-service/**'
      - 'domains/ml-engine/rag-service/**'
      - 'domains/ml-engine/model-prep/**'
      - 'domains/ml-engine/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-ml.yml'
      - '.github/workflows/reusable-group-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-ml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: ml
      domain_dir: ml-engine
      services: '["openvino-service","ml-service","ai-core-service","ai-training-service","device-intelligence-service","rag-service","model-prep"]'
