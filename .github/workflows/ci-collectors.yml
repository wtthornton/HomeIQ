name: "CI \u2014 Data Collectors"

on:
  push:
    paths:
      - 'services/weather-api/**'
      - 'services/smart-meter-service/**'
      - 'services/sports-api/**'
      - 'services/air-quality-service/**'
      - 'services/carbon-intensity-service/**'
      - 'services/electricity-pricing-service/**'
      - 'services/calendar-service/**'
      - 'services/log-aggregator/**'
      - 'compose/collectors.yml'
      - 'shared/patterns/**'
      - '.github/workflows/ci-collectors.yml'
      - '.github/workflows/reusable-group-ci.yml'
  pull_request:
    paths:
      - 'services/weather-api/**'
      - 'services/smart-meter-service/**'
      - 'services/sports-api/**'
      - 'services/air-quality-service/**'
      - 'services/carbon-intensity-service/**'
      - 'services/electricity-pricing-service/**'
      - 'services/calendar-service/**'
      - 'services/log-aggregator/**'
      - 'compose/collectors.yml'
      - 'shared/patterns/**'
      - '.github/workflows/ci-collectors.yml'
      - '.github/workflows/reusable-group-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-collectors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: collectors
      services: '["weather-api","smart-meter-service","sports-api","air-quality-service","carbon-intensity-service","electricity-pricing-service","calendar-service","log-aggregator"]'
