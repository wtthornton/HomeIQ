name: "Publish Shared Patterns & Cascade"

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'shared/patterns/**'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

concurrency:
  group: publish-shared-patterns-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test Shared Patterns
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint shared patterns
        run: ruff check shared/patterns/

      - name: Install shared patterns dependencies
        run: |
          if [ -f shared/patterns/requirements.txt ]; then
            pip install -r shared/patterns/requirements.txt
          fi
          pip install pytest pytest-asyncio pytest-timeout 2>/dev/null || true

      - name: Run shared patterns tests
        run: |
          if [ -d "shared/patterns/tests" ] && \
             [ -n "$(find shared/patterns/tests -name 'test_*.py' -o -name '*_test.py' 2>/dev/null)" ]; then
            pytest shared/patterns/tests/ -v --timeout=300
          else
            echo "No shared patterns tests found — skipping"
          fi

  cascade-group-rebuilds:
    name: "Cascade — Trigger group CI"
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        workflow:
          - ci-core.yml
          - ci-collectors.yml
          - ci-ml.yml
          - ci-automation.yml
          - ci-devices.yml
          - ci-frontends.yml
      fail-fast: false
    steps:
      - name: Dispatch ${{ matrix.workflow }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '${{ matrix.workflow }}',
              ref: context.ref
            });
            console.log('Dispatched ${{ matrix.workflow }} on ref ' + context.ref);
