name: E2E & Integration Tests

# NOTE: Per-service unit tests are now handled by domain-scoped CI workflows
# (ci-core.yml, ci-automation.yml, ci-ml.yml, etc.) via reusable-group-ci.yml.
# This workflow focuses on cross-service E2E and integration tests only.
# The monolithic python-tests matrix was removed on 2026-02-25 (CI/CD Phase 3, step 3.7).

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual triggering

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Job 1: End-to-End Tests (Playwright)
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Check if e2e tests exist
        id: check-e2e
        run: |
          if [ -d "tests/e2e" ] && [ -f "tests/e2e/package.json" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "E2E tests found"
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No E2E tests found - skipping"
          fi

      - name: Set up Docker Buildx
        if: steps.check-e2e.outputs.has_tests == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Start Docker services
        if: steps.check-e2e.outputs.has_tests == 'true'
        run: |
          # Create minimal .env file for testing
          mkdir -p infrastructure
          cat > infrastructure/.env << EOF
          # Test configuration
          HA_HTTP_URL=http://ha-simulator:8123
          HA_WS_URL=ws://ha-simulator:8123/api/websocket
          HA_TOKEN=test_token
          INFLUXDB_URL=http://influxdb:8086
          INFLUXDB_TOKEN=test_token
          INFLUXDB_ORG=homeassistant
          INFLUXDB_BUCKET=home_assistant_events
          OPENAI_API_KEY=sk-test-key
          EOF

          # Start services
          docker compose up -d

      - name: Wait for services to be healthy
        if: steps.check-e2e.outputs.has_tests == 'true'
        run: |
          echo "Waiting for services to become healthy..."
          MAX_WAIT=180  # 3 minutes
          ELAPSED=0
          INTERVAL=5

          # Install jq if not available (should be available on ubuntu-latest)
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Count healthy services
            HEALTHY_COUNT=$(docker compose ps --format json 2>/dev/null | jq -r '[.[] | select(.Health == "healthy")] | length' || echo "0")
            TOTAL_COUNT=$(docker compose ps --format json 2>/dev/null | jq -r 'length' || echo "0")
            RUNNING_COUNT=$(docker compose ps --format json 2>/dev/null | jq -r '[.[] | select(.State == "running")] | length' || echo "0")

            if [ "$TOTAL_COUNT" -gt "0" ] && [ "$RUNNING_COUNT" -eq "$TOTAL_COUNT" ]; then
              # All services are running, check if they have health checks
              if [ "$HEALTHY_COUNT" -eq "$TOTAL_COUNT" ] || [ "$HEALTHY_COUNT" -gt "0" ]; then
                echo "Services ready: $RUNNING_COUNT running, $HEALTHY_COUNT healthy"
                docker compose ps
                exit 0
              fi
            fi

            echo "Services: $RUNNING_COUNT/$TOTAL_COUNT running, $HEALTHY_COUNT healthy (waiting ${ELAPSED}s/${MAX_WAIT}s)..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timeout waiting for services to become healthy"
          echo "Service status:"
          docker compose ps
          echo ""
          echo "Recent logs:"
          docker compose logs --tail=50
          exit 1

      - name: Install Playwright dependencies
        if: steps.check-e2e.outputs.has_tests == 'true'
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests (AI Automation UI)
        if: steps.check-e2e.outputs.has_tests == 'true'
        working-directory: tests/e2e
        env:
          TEST_BASE_URL: http://localhost:3001
        run: |
          npx playwright test ai-automation-ui --config ai-automation-ui/playwright.config.ts --project=chromium --grep "@smoke|@integration" --reporter=list

      - name: Run Playwright smoke tests (Health Dashboard)
        if: steps.check-e2e.outputs.has_tests == 'true'
        working-directory: tests/e2e
        env:
          TEST_BASE_URL: http://localhost:3000
        run: |
          npx playwright test health-dashboard --config health-dashboard/playwright.config.ts --project=chromium --grep "@smoke" --reporter=list

      - name: Run Playwright tests (excluding live-AI quarantined tests)
        if: steps.check-e2e.outputs.has_tests == 'true'
        working-directory: tests/e2e
        run: |
          npx playwright test \
            --ignore-pattern="ask-ai-complete.spec.ts" \
            --ignore-pattern="ask-ai-to-ha-automation.spec.ts" \
            --ignore-pattern="ask-ai-debug.spec.ts" \
            --reporter=html,json

      - name: E2E pass-rate check (Epic 89.5)
        if: always() && steps.check-e2e.outputs.has_tests == 'true'
        working-directory: tests/e2e
        run: |
          if [ -f "test-results/results.json" ]; then
            TOTAL=$(jq '.stats.expected // 0' test-results/results.json)
            PASSED=$(jq '.stats.expected // 0' test-results/results.json)
            FAILED=$(jq '.stats.unexpected // 0' test-results/results.json)
            SKIPPED=$(jq '.stats.skipped // 0' test-results/results.json)
            if [ "$TOTAL" -gt 0 ]; then
              PASS_RATE=$(( (TOTAL - FAILED) * 100 / TOTAL ))
              echo "### E2E Pass Rate: ${PASS_RATE}%" >> $GITHUB_STEP_SUMMARY
              echo "- Passed: $PASSED | Failed: $FAILED | Skipped: $SKIPPED" >> $GITHUB_STEP_SUMMARY
              if [ "$PASS_RATE" -lt 95 ]; then
                echo "::warning::E2E pass rate ${PASS_RATE}% is below 95% threshold"
              fi
            fi
          else
            echo "No JSON results found — skipping pass-rate check"
          fi

      - name: Upload Playwright report
        if: always() && steps.check-e2e.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Show service logs on failure
        if: failure() && steps.check-e2e.outputs.has_tests == 'true'
        run: |
          echo "Service Logs:"
          docker compose logs --tail=100

      - name: Stop Docker services
        if: always() && steps.check-e2e.outputs.has_tests == 'true'
        run: |
          docker compose down -v

  # Job 2: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Check if integration tests exist
        id: check-integration
        run: |
          if [ -d "tests/integration" ] && [ -n "$(find tests/integration -name 'test_*.py' 2>/dev/null)" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "Integration tests found"
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No integration tests found - skipping"
          fi

      - name: Install dependencies
        if: steps.check-integration.outputs.has_tests == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout httpx aiohttp

          # Install shared libraries
          for lib in libs/homeiq-*/; do
            pip install "$lib" 2>/dev/null || true
          done

      - name: Run integration tests
        if: steps.check-integration.outputs.has_tests == 'true'
        run: |
          pytest tests/integration/ \
            --verbose \
            --timeout=300 \
            -m "integration"

  # Job 3: Test Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-tests, integration-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "## Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Per-service unit tests run in domain-scoped CI workflows." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.e2e-tests.result }}" == "success" ]; then
            echo "**E2E Tests:** Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.e2e-tests.result }}" == "skipped" ]; then
            echo "**E2E Tests:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "**E2E Tests:** Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "**Integration Tests:** Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.integration-tests.result }}" == "skipped" ]; then
            echo "**Integration Tests:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Integration Tests:** Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
