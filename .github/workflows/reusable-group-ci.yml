name: Group CI (Reusable)

on:
  workflow_call:
    inputs:
      group_name:
        required: true
        type: string
        description: "Name of the service group (e.g., core, collectors, ml)"
      domain_dir:
        required: true
        type: string
        description: "Domain directory under domains/ (e.g., core-platform, data-collectors)"
      services:
        required: true
        type: string
        description: "JSON array of service directory names"

permissions:
  contents: read

jobs:
  lint-and-test:
    name: "CI — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ inputs.group_name }}-${{ matrix.service }}-${{ github.ref }}
      cancel-in-progress: true

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: homeiq
          POSTGRES_PASSWORD: homeiq_test
          POSTGRES_DB: homeiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        service: ${{ fromJson(inputs.services) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check domains/${{ inputs.domain_dir }}/${{ matrix.service }}/

      - name: Check formatting with ruff
        run: ruff format --check domains/${{ inputs.domain_dir }}/${{ matrix.service }}/

      - name: Validate Dockerfile shared libs
        run: python scripts/validate-dockerfile-libs.py --strict

      - name: Install shared libraries
        run: |
          for lib in libs/homeiq-*/; do
            pip install "$lib" 2>/dev/null || true
          done

      - name: Check if service has requirements
        id: check-requirements
        run: |
          if [ -f "domains/${{ inputs.domain_dir }}/${{ matrix.service }}/requirements.txt" ]; then
            echo "has_requirements=true" >> $GITHUB_OUTPUT
          else
            echo "has_requirements=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check-requirements.outputs.has_requirements == 'true'
        run: |
          pip install -r domains/${{ inputs.domain_dir }}/${{ matrix.service }}/requirements.txt
          pip install pytest pytest-asyncio pytest-timeout 2>/dev/null || true

      - name: Initialize PostgreSQL schemas
        run: |
          PGPASSWORD=homeiq_test psql -h localhost -U homeiq -d homeiq_test -f infrastructure/postgres/init-schemas.sql
        env:
          PGPASSWORD: homeiq_test

      - name: Check if service has tests
        id: check-tests
        run: |
          if [ -d "domains/${{ inputs.domain_dir }}/${{ matrix.service }}/tests" ] && \
             [ -n "$(find domains/${{ inputs.domain_dir }}/${{ matrix.service }}/tests -name 'test_*.py' -o -name '*_test.py' 2>/dev/null)" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          cd domains/${{ inputs.domain_dir }}/${{ matrix.service }}
          pytest tests/ -v --timeout=300
        env:
          POSTGRES_URL: postgresql+asyncpg://homeiq:homeiq_test@localhost:5432/homeiq_test

      - name: Test Alembic migrations
        if: hashFiles(format('{0}/alembic.ini', format('domains/{0}/{1}', inputs.domain_dir, matrix.service))) != ''
        run: |
          cd domains/${{ inputs.domain_dir }}/${{ matrix.service }}
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head
        env:
          POSTGRES_URL: postgresql+asyncpg://homeiq:homeiq_test@localhost:5432/homeiq_test

      - name: Report no tests
        if: steps.check-tests.outputs.has_tests == 'false'
        run: echo "No tests found for ${{ matrix.service }} — skipping test step"
