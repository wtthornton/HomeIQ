name: "CI — Pattern Analysis"

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-pattern-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: pattern-analysis
      domain_dir: pattern-analysis
      services: '["ai-pattern-service","api-automation-edge"]'
