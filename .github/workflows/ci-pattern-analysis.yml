name: "CI — Pattern Analysis"

on:
  push:
    paths:
      - 'domains/pattern-analysis/ai-pattern-service/**'
      - 'domains/pattern-analysis/api-automation-edge/**'
      - 'domains/pattern-analysis/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-pattern-analysis.yml'
      - '.github/workflows/reusable-group-ci.yml'
  pull_request:
    paths:
      - 'domains/pattern-analysis/ai-pattern-service/**'
      - 'domains/pattern-analysis/api-automation-edge/**'
      - 'domains/pattern-analysis/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-pattern-analysis.yml'
      - '.github/workflows/reusable-group-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-pattern-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: pattern-analysis
      domain_dir: pattern-analysis
      services: '["ai-pattern-service","api-automation-edge"]'
