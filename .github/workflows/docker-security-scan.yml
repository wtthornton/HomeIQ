name: Docker Security Scan

on:
  workflow_dispatch:

jobs:
  scan-images:
    name: Security Scan Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - websocket-ingestion
          - data-api
          - admin-api
          - weather-api
          - health-dashboard
          - ai-automation-service-new
          - ha-ai-agent-service
          - ai-query-service
          - ai-pattern-service
          - energy-correlator
          - energy-forecasting
          - device-intelligence-service
          - ml-service
          - ai-core-service
          - openvino-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Find Dockerfile
        id: find-dockerfile
        run: |
          DOCKERFILE=$(find domains -path "*/${{ matrix.service }}/Dockerfile" -print -quit)
          if [ -n "$DOCKERFILE" ]; then
            echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Dockerfile found at $DOCKERFILE"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Dockerfile not found for ${{ matrix.service }}, skipping"
          fi

      - name: Build Docker image
        if: steps.find-dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.find-dockerfile.outputs.dockerfile }}
          push: false
          tags: homeiq-${{ matrix.service }}:scan
          load: true

      - name: Run Trivy vulnerability scanner
        if: steps.find-dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: homeiq-${{ matrix.service }}:scan
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        if: steps.find-dockerfile.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'

  scan-all:
    name: Security Scan All Services
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all services
        run: |
          docker compose build --parallel

      - name: Scan all images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'docker-compose.yml'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
