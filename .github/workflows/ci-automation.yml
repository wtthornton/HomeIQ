name: "CI — Automation Core"

on:
  push:
    paths:
      - 'domains/automation-core/ha-ai-agent-service/**'
      - 'domains/automation-core/ai-automation-service-new/**'
      - 'domains/automation-core/ai-query-service/**'
      - 'domains/automation-core/automation-linter/**'
      - 'domains/automation-core/yaml-validation-service/**'
      - 'domains/automation-core/ai-code-executor/**'
      - 'domains/automation-core/automation-trace-service/**'
      - 'domains/automation-core/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-automation.yml'
      - '.github/workflows/reusable-group-ci.yml'
  pull_request:
    paths:
      - 'domains/automation-core/ha-ai-agent-service/**'
      - 'domains/automation-core/ai-automation-service-new/**'
      - 'domains/automation-core/ai-query-service/**'
      - 'domains/automation-core/automation-linter/**'
      - 'domains/automation-core/yaml-validation-service/**'
      - 'domains/automation-core/ai-code-executor/**'
      - 'domains/automation-core/automation-trace-service/**'
      - 'domains/automation-core/compose.yml'
      - 'libs/**'
      - '.github/workflows/ci-automation.yml'
      - '.github/workflows/reusable-group-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-automation-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: automation-core
      domain_dir: automation-core
      services: '["ha-ai-agent-service","ai-automation-service-new","ai-query-service","automation-linter","yaml-validation-service","ai-code-executor","automation-trace-service"]'
