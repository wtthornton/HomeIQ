name: "CI — Automation Core"

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-automation-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: automation-core
      domain_dir: automation-core
      services: '["ha-ai-agent-service","ai-automation-service-new","ai-query-service","automation-linter","yaml-validation-service","ai-code-executor","automation-trace-service"]'
