name: "CI — Device Management"

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-devices-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-group-ci.yml
    with:
      group_name: devices
      domain_dir: device-management
      services: '["device-health-monitor","device-context-classifier","device-setup-assistant","device-database-client","device-recommender","activity-recognition","activity-writer","ha-setup-service"]'
